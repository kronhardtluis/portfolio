<div id="commentary">
  @for (item of comments; track item.name) {
    <div class="comment-box">
      <div id="comment-frame">
        <i>"</i>
        <p id="citation">{{ 'comments.' + item.name + '.comment' | translate }}</p>
        <div id="colleague">
          <div id="blue-line"></div>
          <p>
            {{ item.name | translate }}
            <span>|</span>
            {{ 'comments.' + item.name + '.profession' | translate }}
          </p>
        </div>
      </div>
      <div id="colleague-picture">
        <img id="portrait" src="{{ 'comments.' + item.name + '.img' | translate }}" alt="" />
      </div>
      <div id="picture-line"></div>
    </div>
  }
</div>
