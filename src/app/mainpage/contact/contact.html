<img class="background" src="assets/img/contact-bg.png" alt="">

<div id="title">
  <h2>{{'contact.title' | translate}}</h2>
  <div id="green-line"></div>
</div>

<div id="form-explanation">
  <div id="inducement">
    <div id="blue-line"></div>
    <h4>{{'contact.subtitle' | translate}}</h4>
    <p>
      {{'contact.why' | translate}}
      <br /><br />
      {{'contact.needed' | translate}} <b>{{'contact.me' | translate}}</b>
    </p>
  </div>

  <form id="mailing">
    <input class="text-input" id="name" type="text" placeholder="{{'contact.name' | translate}}" />
    <input class="text-input" id="email" type="text" placeholder="{{'contact.mail' | translate}}" />
    <textarea class="text-input" id="message" type="text" placeholder="{{'contact.message' | translate}}"></textarea>
    <button type="button" (click)="toggleCheckbox()" id="checkbox-div">
        @if(!checkbox){
          <img src="assets/icons/checkbox.png" alt="checkbox">
        } @else {
          <img src="assets/icons/checkbox-checked.png" alt="checkbox">
        }
      <p>
        {{'contact.have' | translate}}<a routerLink="legals"> {{'contact.legals' | translate}} </a>{{'contact.agree' | translate}}
      </p>
    </button>
    @if(!checkbox){
      <div id="send-preview">{{'contact.send' | translate}}</div>
    } @else {
      <button id="send-button">{{'contact.send' | translate}}</button>
    }
  </form>
</div>

<a id="scroll" href="#head"><img src="assets/icons/scroll-up.png" alt=""></a>
